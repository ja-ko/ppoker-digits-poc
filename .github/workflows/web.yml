name: Web

on:
  push:
    paths:
      - "web-client/**"
      - "scripts/serve-handwriting-poc.sh"
      - "README.md"
      - "docs/handwriting-poc*.md"
      - "docs/mobile-client-product-plan.md"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web-client/**"
      - "scripts/serve-handwriting-poc.sh"
      - "README.md"
      - "docs/handwriting-poc*.md"
      - "docs/mobile-client-product-plan.md"
      - ".github/workflows/web.yml"

jobs:
  verify:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web-client/.nvmrc
          cache: npm
          cache-dependency-path: web-client/package-lock.json
      - name: Use locked npm version
        run: npm install --global npm@12.0.0
      - name: Install dependencies
        run: npm ci
      - name: Install pinned Playwright Chromium headless shell and dependencies
        run: npx playwright install --with-deps --only-shell chromium
      - name: Check POC launcher syntax
        run: bash -n ../scripts/serve-handwriting-poc.sh
      - name: Run full web verification including Chromium E2E
        run: npm run verify:full
        env:
          CHROME_BIN: google-chrome
