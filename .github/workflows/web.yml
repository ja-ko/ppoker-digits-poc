name: Web

on:
  push:
    paths:
      - "web-client/**"
      - "scripts/serve-handwriting-poc.sh"
      - "LICENSE"
      - "ml/digits/NOTICE.md"
      - "third_party/licenses/Apache-2.0.txt"
      - "README.md"
      - "docs/handwriting-poc*.md"
      - "docs/mobile-client-product-plan.md"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web-client/**"
      - "scripts/serve-handwriting-poc.sh"
      - "LICENSE"
      - "ml/digits/NOTICE.md"
      - "third_party/licenses/Apache-2.0.txt"
      - "README.md"
      - "docs/handwriting-poc*.md"
      - "docs/mobile-client-product-plan.md"
      - ".github/workflows/web.yml"

jobs:
  verify:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: web-client/.nvmrc
          cache: npm
          cache-dependency-path: web-client/package-lock.json
      - name: Use locked npm version
        run: npm install --global npm@12.0.0
      - name: Install dependencies
        run: npm ci
      - name: Install pinned Playwright browser engines and dependencies
        run: npx playwright install --with-deps --only-shell chromium webkit
      - name: Check POC launcher syntax
        run: bash -n ../scripts/serve-handwriting-poc.sh
      - name: Run full web verification including Chromium and WebKit E2E
        run: npm run verify:full
        env:
          CHROME_BIN: google-chrome
